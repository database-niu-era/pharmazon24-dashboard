<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="200" height="200">
  <!-- Background -->
  <rect width="1000" height="1000" fill="none"/>

  <!-- "niu era" text - clean, modern design -->
  <defs>
    <style>
      .niu-text {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 400;
        letter-spacing: 20px;
      }
    </style>
  </defs>

  <!-- Main text -->
  <text x="500" y="580" class="niu-text" font-size="280" text-anchor="middle" fill="#d4c5b9">niu era</text>

  <!-- Decorative line below -->
  <line x1="280" y1="650" x2="720" y2="650" stroke="#d4c5b9" stroke-width="12" stroke-linecap="round"/>
</svg>